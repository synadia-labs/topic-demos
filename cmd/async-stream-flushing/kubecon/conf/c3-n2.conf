include ./shared.conf

port: 4229
http_port: 8229
server_name: c3-n2

jetstream {
  store_dir: "./data/c3-n2/js"
  max_mem: 0
  max_file: 10GB
}

cluster: {
  name: c3,
  port: 6229,
  routes: [
    "nats-route://0.0.0.0:6228",
    "nats-route://0.0.0.0:6229",
    "nats-route://0.0.0.0:6230"
  ],
}

gateway: {
  name: "c3",
  port: 7229,
  gateways: [
    {name: "c1", urls: ["nats://0.0.0.0:7222"]},
    {name: "c2", urls: ["nats://0.0.0.0:7225"]},
    {name: "c3", urls: ["nats://0.0.0.0:7228"]},
  ]
}

leafnodes: {
  port: 7407
}
