version: '3'

tasks:

  compose:
    desc: "Start all services with Docker Compose (NATS embedded in each container)"
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - docker compose up --build

  compose:down:
    desc: "Stop and remove compose services and volumes"
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - docker compose down -v

  compose:except-america:
    desc: "Start all services except america (debug america locally)"
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - docker compose up --build global asia europe spain france england

  compose:except-asia:
    desc: "Start all services except asia (debug asia locally)"
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - docker compose up --build global america europe spain france england

  compose:except-europe:
    desc: "Start all services except europe (debug europe locally)"
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - docker compose up --build global asia america spain france england

  compose:except-spain:
    desc: "Start all services except spain (debug spain locally)"
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - docker compose up --build global asia america europe france england

  compose:except-france:
    desc: "Start all services except france (debug france locally)"
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - docker compose up --build global asia america europe spain england

  compose:except-england:
    desc: "Start all services except england (debug england locally)"
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - docker compose up --build global asia america europe spain france

  node:isolate:
    desc: "Partition a leaf node's NATS connection (HTTP stays up). Usage: task node:isolate NODE=spain"
    vars:
      PORT:
        sh: |
          case "{{.NODE}}" in
            spain)   echo 8084 ;;
            france)  echo 8085 ;;
            england) echo 8086 ;;
            *) echo "unknown node: {{.NODE}}" >&2; exit 1 ;;
          esac
    cmds:
      - curl -sf -X POST http://localhost:{{.PORT}}/partition

  node:rejoin:
    desc: "Restore a leaf node's NATS connection. Usage: task node:rejoin NODE=spain"
    vars:
      PORT:
        sh: |
          case "{{.NODE}}" in
            spain)   echo 8084 ;;
            france)  echo 8085 ;;
            england) echo 8086 ;;
            *) echo "unknown node: {{.NODE}}" >&2; exit 1 ;;
          esac
    cmds:
      - curl -sf -X POST http://localhost:{{.PORT}}/rejoin

  europe:down:
    desc: "Stop Europe container (full outage demo — Spain/France/England accumulate locally)"
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - docker compose stop europe

  europe:up:
    desc: "Start Europe container (sources catch up from Spain/France/England, Global snaps to correct total)"
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - docker compose start europe

  update-template:
    desc: "Copy template.html to all region static/index.html files"
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - cp template.html america/static/index.html
      - cp template.html asia/static/index.html
      - cp template.html england/static/index.html
      - cp template.html europe/static/index.html
      - cp template.html france/static/index.html
      - cp template.html spain/static/index.html
