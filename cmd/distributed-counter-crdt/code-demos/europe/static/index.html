<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Europe — NATS Counter CRDT</title>
<script src="https://cdn.tailwindcss.com"></script>
<script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.1/bundles/datastar.js"></script>
</head>
<body class="bg-[#0a0a0a] text-white font-mono min-h-screen flex flex-col items-center justify-center"
      style="--node-color: #22c55e; gap: 3rem;"
      data-signals:hits="null"
      data-init="@get('/counters')">

<div class="flex flex-col items-center border border-[#222] rounded-2xl" style="padding: 5rem 6rem; gap: 2rem; display: none"
     data-show="$hits !== null">
  <div class="text-[#666]" style="font-size: 2.5rem;">Europe</div>
  <div class="font-bold tabular-nums" style="font-size: 16rem; line-height: 1; color: var(--node-color);"
       data-text="$hits ?? 0">—</div>
  <div class="border-t border-[#222] flex flex-col items-center w-full" style="margin-top: 2rem; padding-top: 2rem; gap: 1.25rem;">
    <div class="flex flex-wrap justify-center" style="gap: 3rem;">
      <a href="http://localhost:8081" class="text-[#555] hover:text-white transition-colors" style="font-size: 1.5rem;">↑ Global</a>
      <a href="http://localhost:8082" class="text-[#555] hover:text-white transition-colors" style="font-size: 1.5rem;">America</a>
      <a href="http://localhost:8080" class="text-[#555] hover:text-white transition-colors" style="font-size: 1.5rem;">Asia</a>
    </div>
    <div class="flex flex-wrap justify-center" style="gap: 2rem;">
      <a href="http://localhost:8085" class="text-[#333] hover:text-[#a855f7] transition-colors" style="font-size: 1.1rem;">France</a>
      <a href="http://localhost:8084" class="text-[#333] hover:text-[#ef4444] transition-colors" style="font-size: 1.1rem;">Spain</a>
      <a href="http://localhost:8086" class="text-[#333] hover:text-[#f59e0b] transition-colors" style="font-size: 1.1rem;">England</a>
    </div>
  </div>
</div>

</body>
</html>
