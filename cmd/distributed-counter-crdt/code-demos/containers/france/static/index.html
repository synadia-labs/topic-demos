<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>France — NATS Counter CRDT</title>
<script src="https://cdn.tailwindcss.com"></script>
<script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.1/bundles/datastar.js"></script>
</head>
<body class="bg-[#0a0a0a] text-white font-mono min-h-screen flex flex-col items-center justify-center gap-5"
      style="--node-color: #a855f7"
      data-signals:franceHits="'0'"
      data-init="@get('/counters')">

<div class="flex flex-col items-center gap-2.5 p-8 border border-[#222] rounded-xl">
  <div class="text-sm text-[#666]">France</div>
  <div class="text-6xl font-bold tabular-nums" style="color: var(--node-color)" data-text="$franceHits">—</div>
  <div class="mt-4 flex gap-3">
    <button
      class="px-6 py-3 rounded-lg text-white font-bold text-lg hover:opacity-80 active:scale-95 transition-all cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed"
      style="background: var(--node-color)"
      data-attr:disabled="$franceHits == '0'"
      data-on:click="@post('/decrement/france')">
      −1
    </button>
    <button
      class="px-6 py-3 rounded-lg text-white font-bold text-lg hover:opacity-80 active:scale-95 transition-all cursor-pointer"
      style="background: var(--node-color)"
      data-on:click="@post('/hit/france')">
      +1
    </button>
  </div>
  <div class="mt-4 pt-4 border-t border-[#222] flex gap-4 flex-wrap justify-center">
    <a href="http://localhost:8083" class="text-xs text-[#555] hover:text-white transition-colors">↑ Europe</a>
  </div>
</div>

</body>
</html>
