<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Global — NATS Counter CRDT</title>
<script src="https://cdn.tailwindcss.com"></script>
<script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.1/bundles/datastar.js"></script>
</head>
<body class="bg-[#0a0a0a] text-white font-mono min-h-screen flex flex-col items-center justify-center"
      style="gap: 3rem;"
      data-signals:globalHits="'0'"
      data-signals:americaHits="'0'"
      data-signals:asiaHits="'0'"
      data-signals:europeHits="'0'"
      data-signals:franceHits="'0'"
      data-signals:spainHits="'0'"
      data-signals:englandHits="'0'"
      data-signals:showBreakdown="false"
      data-init="@get('/counters')">

<div data-init="@get('/breakdown')"></div>

<div class="flex flex-col items-center border border-[#222] rounded-2xl" style="padding: 5rem 6rem; gap: 2rem;">

  <div class="text-[#666]" style="font-size: 2.5rem;">Global</div>

  <div class="font-bold tabular-nums" style="font-size: 16rem; line-height: 1; color: #8b5cf6;" data-text="$globalHits">0</div>

  <button
    class="font-bold rounded-xl hover:opacity-80 active:scale-95 transition-all cursor-pointer"
    style="background: #333; color: #aaa; padding: 1rem 2.5rem; font-size: 1.75rem;"
    data-on:click="$showBreakdown = !$showBreakdown"
    data-text="$showBreakdown ? 'Hide Breakdown' : 'Show Breakdown'">
    Show Breakdown
  </button>

  <div data-show="$showBreakdown" class="w-full flex flex-col border-t border-[#222]" style="padding-top: 2rem; gap: 1.25rem;">
    <div class="flex items-center justify-between" style="gap: 6rem;">
      <span style="color: #3b82f6; font-size: 2rem;">America</span>
      <span class="font-bold tabular-nums" style="color: #3b82f6; font-size: 4rem;" data-text="$americaHits">0</span>
    </div>
    <div class="flex items-center justify-between" style="gap: 6rem;">
      <span style="color: #f97316; font-size: 2rem;">Asia</span>
      <span class="font-bold tabular-nums" style="color: #f97316; font-size: 4rem;" data-text="$asiaHits">0</span>
    </div>
    <div class="flex items-center justify-between" style="gap: 6rem;">
      <span style="color: #22c55e; font-size: 2rem;">Europe</span>
      <span class="font-bold tabular-nums" style="color: #22c55e; font-size: 4rem;" data-text="$europeHits">0</span>
    </div>
    <div class="flex flex-col" style="padding-left: 3rem; gap: 0.5rem;">
      <div class="flex items-center justify-between" style="gap: 6rem;">
        <span style="color: #a855f7; font-size: 1.25rem;">France</span>
        <span class="font-bold tabular-nums" style="color: #a855f7; font-size: 2rem;" data-text="$franceHits">0</span>
      </div>
      <div class="flex items-center justify-between" style="gap: 6rem;">
        <span style="color: #ef4444; font-size: 1.25rem;">Spain</span>
        <span class="font-bold tabular-nums" style="color: #ef4444; font-size: 2rem;" data-text="$spainHits">0</span>
      </div>
      <div class="flex items-center justify-between" style="gap: 6rem;">
        <span style="color: #f59e0b; font-size: 1.25rem;">England</span>
        <span class="font-bold tabular-nums" style="color: #f59e0b; font-size: 2rem;" data-text="$englandHits">0</span>
      </div>
    </div>
  </div>

  <div class="border-t border-[#222] flex flex-wrap justify-center w-full" style="padding-top: 2rem; gap: 3rem;">
    <a href="http://localhost:8082" class="text-[#555] hover:text-white transition-colors" style="font-size: 1.5rem;">America</a>
    <a href="http://localhost:8080" class="text-[#555] hover:text-white transition-colors" style="font-size: 1.5rem;">Asia</a>
    <a href="http://localhost:8083" class="text-[#555] hover:text-white transition-colors" style="font-size: 1.5rem;">Europe</a>
  </div>

</div>

</body>
</html>
