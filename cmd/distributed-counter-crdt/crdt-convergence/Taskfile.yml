version: '3'

vars:
  VERSION: main
  BIN: '{{.TASKFILE_DIR}}/../../../server/bin/{{.VERSION}}/nats-server'

tasks:

  start:
    desc: "Start east + west JetStream nodes (ports 4250, 4251)"
    silent: true
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - |
        if [ ! -f "{{.BIN}}" ]; then
          echo "nats-server binary not found at {{.BIN}}"
          echo "Run 'task server:download' from the repo root first."
          exit 1
        fi
      - mkdir -p logs data
      - |
        {{.BIN}} -c conf/east.conf > logs/east.log 2>&1 &
        echo $! >> .pids
        {{.BIN}} -c conf/west.conf > logs/west.log 2>&1 &
        echo $! >> .pids
      - curl --fail --silent --retry 10 --retry-delay 1 --retry-connrefused http://localhost:8250/healthz > /dev/null
      - curl --fail --silent --retry 10 --retry-delay 1 --retry-connrefused http://localhost:8251/healthz > /dev/null
      - echo "east (4250) and west (4251) healthy"

  stop:
    desc: "Stop servers and wipe data"
    silent: true
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - (cat .pids 2>/dev/null | xargs kill 2>/dev/null) || true
      - rm -f .pids
      - rm -rf data logs
      - echo "Stopped."

  run:
    desc: "Run the CRDT convergence demo"
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - go run .

  reset:
    desc: "Stop, wipe, and restart servers"
    cmds:
      - task: stop
      - task: start
