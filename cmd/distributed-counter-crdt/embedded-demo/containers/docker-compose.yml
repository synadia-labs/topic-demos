services:
  nats-global:
    image: nats:2.12.7
    command: -c /conf/global.conf
    volumes:
      - ./conf/global.conf:/conf/global.conf:ro
      - nats-global-data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--health"]
      interval: 2s
      timeout: 5s
      retries: 15

  nats-asia:
    image: nats:2.12.7
    command: -c /conf/asia.conf
    volumes:
      - ./conf/asia.conf:/conf/asia.conf:ro
      - nats-asia-data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--health"]
      interval: 2s
      timeout: 5s
      retries: 15
    depends_on:
      nats-global:
        condition: service_healthy

  nats-america:
    image: nats:2.12.7
    command: -c /conf/america.conf
    volumes:
      - ./conf/america.conf:/conf/america.conf:ro
      - nats-america-data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--health"]
      interval: 2s
      timeout: 5s
      retries: 15
    depends_on:
      nats-global:
        condition: service_healthy

  nats-europe:
    image: nats:2.12.7
    command: -c /conf/europe.conf
    volumes:
      - ./conf/europe.conf:/conf/europe.conf:ro
      - nats-europe-data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--health"]
      interval: 2s
      timeout: 5s
      retries: 15
    depends_on:
      nats-global:
        condition: service_healthy

  nats-spain:
    image: nats:2.12.7
    command: -c /conf/spain.conf
    volumes:
      - ./conf/spain.conf:/conf/spain.conf:ro
      - nats-spain-data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--health"]
      interval: 2s
      timeout: 5s
      retries: 15
    depends_on:
      nats-europe:
        condition: service_healthy

  nats-france:
    image: nats:2.12.7
    command: -c /conf/france.conf
    volumes:
      - ./conf/france.conf:/conf/france.conf:ro
      - nats-france-data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--health"]
      interval: 2s
      timeout: 5s
      retries: 15
    depends_on:
      nats-europe:
        condition: service_healthy

  nats-england:
    image: nats:2.12.7
    command: -c /conf/england.conf
    volumes:
      - ./conf/england.conf:/conf/england.conf:ro
      - nats-england-data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--health"]
      interval: 2s
      timeout: 5s
      retries: 15
    depends_on:
      nats-europe:
        condition: service_healthy

  asia:
    build: ./asia
    ports:
      - "8080:8080"
    environment:
      - NATS_URL=nats://nats-asia:4222
    depends_on:
      nats-asia:
        condition: service_healthy
    restart: on-failure

  america:
    build: ./america
    ports:
      - "8082:8080"
    environment:
      - NATS_URL=nats://nats-america:4222
    depends_on:
      nats-america:
        condition: service_healthy
    restart: on-failure

  europe:
    build: ./europe
    ports:
      - "8083:8080"
    environment:
      - NATS_URL=nats://nats-europe:4222
    depends_on:
      nats-europe:
        condition: service_healthy
    restart: on-failure

  spain:
    build: ./spain
    ports:
      - "8084:8080"
    environment:
      - NATS_URL=nats://nats-spain:4222
    depends_on:
      nats-spain:
        condition: service_healthy
    restart: on-failure

  france:
    build: ./france
    ports:
      - "8085:8080"
    environment:
      - NATS_URL=nats://nats-france:4222
    depends_on:
      nats-france:
        condition: service_healthy
    restart: on-failure

  england:
    build: ./england
    ports:
      - "8086:8080"
    environment:
      - NATS_URL=nats://nats-england:4222
    depends_on:
      nats-england:
        condition: service_healthy
    restart: on-failure

  global:
    build: ./global
    ports:
      - "8081:8080"
    environment:
      - NATS_URL=nats://nats-global:4222
    depends_on:
      nats-global:
        condition: service_healthy
      nats-asia:
        condition: service_healthy
      nats-america:
        condition: service_healthy
      nats-europe:
        condition: service_healthy
    restart: on-failure

volumes:
  nats-global-data:
  nats-asia-data:
  nats-america-data:
  nats-europe-data:
  nats-spain-data:
  nats-france-data:
  nats-england-data:
