<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Global — NATS Counter CRDT</title>
<script src="https://cdn.tailwindcss.com"></script>
<script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.1/bundles/datastar.js"></script>
</head>
<body class="bg-[#0a0a0a] text-white font-mono min-h-screen flex flex-col items-center justify-center gap-5"
      style="--node-color: #8b5cf6"
      data-signals:globalHits="'0'"
      data-init="@get('/counters')">

<div class="flex flex-col items-center gap-2.5 p-8 border border-[#222] rounded-xl">
  <div class="text-sm text-[#666]">Global</div>
  <div class="text-6xl font-bold tabular-nums" style="color: var(--node-color)" data-text="$globalHits">—</div>
  <div class="mt-6 pt-4 border-t border-[#222] flex gap-4 flex-wrap justify-center">
    <a href="http://localhost:8080" class="text-xs text-[#555] hover:text-white transition-colors">Asia</a>
    <a href="http://localhost:8082" class="text-xs text-[#555] hover:text-white transition-colors">America</a>
    <a href="http://localhost:8083" class="text-xs text-[#555] hover:text-white transition-colors">Europe</a>
  </div>
</div>

</body>
</html>
