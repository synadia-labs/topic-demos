server_name: n3

jetstream {
  store_dir: "./data/cluster/n3/js"
  max_mem: 0
  max_file: 10GB
}

cluster: {
  name: cluster,
  port: 6224,
  routes: [
    "nats-route://0.0.0.0:6222",
    "nats-route://0.0.0.0:6223",
    "nats-route://0.0.0.0:6224"
  ],
}
