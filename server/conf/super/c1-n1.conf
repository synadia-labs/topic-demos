include ../shared.conf

port: 4222
http_port: 8222
server_name: c1-n1

jetstream {
  store_dir: "./data/super/c1-n1/js"
  max_mem: 0
  max_file: 10GB
}

cluster: {
  name: c1,
  port: 6222,
  routes: [
    "nats-route://0.0.0.0:6222",
    "nats-route://0.0.0.0:6223",
    "nats-route://0.0.0.0:6224"
  ],
}

gateway: {
  name: "c1",
  port: 7222,
  gateways: [
    {name: "c1", urls: ["nats://0.0.0.0:7222"]},
    {name: "c2", urls: ["nats://0.0.0.0:7225"]},
    {name: "c3", urls: ["nats://0.0.0.0:7228"]},
  ]
}

leafnodes: {
  port: 7400
}
